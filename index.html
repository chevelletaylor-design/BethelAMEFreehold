<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Bethel African Methodist Episcopal Church — The Church on the Hill. Serving Freehold, NJ since 1848." />
<title>Bethel AME Church — The Church on the Hill | Freehold, NJ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Netlify Identity (handles admin login redirect) -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>
  :root {
    /* Bethel palette — pulled from the logo */
    --cream: #FAF5EC;             /* warm editorial background */
    --cream-deep: #F2EADA;        /* section tone shift */
    --ivory: #FFFCF5;             /* pure light panels */
    --navy: #0E2A4B;              /* deep logo navy */
    --navy-soft: #1E3A5F;
    --navy-ink: #081830;          /* darkest text */
    --sky: #6FA8D4;               /* logo light blue */
    --sky-soft: #C9DDEF;           /* soft accent panel */
    --gold: #E8B547;              /* sunrise gold from logo */
    --gold-deep: #B88726;
    --green: #3A8A4A;              /* logo grass green, used sparingly */
    --ink: #1A2234;
    --ink-soft: #4A546A;
    --rule: rgba(14, 42, 75, 0.12);
    --shadow: 0 18px 45px -18px rgba(14, 42, 75, 0.28);
    --shadow-lift: 0 30px 70px -24px rgba(14, 42, 75, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.65;
    overflow-x: hidden;
  }

  .display { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.018em; line-height: 1.02; }
  em { font-style: italic; font-family: 'Fraunces', Georgia, serif; font-weight: 500; }
  strong { color: var(--navy); font-weight: 600; }

  /* Hand-drawn yellow highlight under emphasized words (like Mike Foster's site) */
  .hl {
    position: relative;
    display: inline-block;
    white-space: nowrap;
  }
  .hl::after {
    content: "";
    position: absolute;
    left: -4%; right: -4%; bottom: 0.04em;
    height: 0.42em;
    background: var(--gold);
    opacity: 0.55;
    z-index: -1;
    border-radius: 8px 22px 14px 28px / 14px 8px 22px 14px;
    transform: rotate(-1deg);
  }
  .hl-circle {
    position: relative;
    display: inline-block;
  }
  .hl-circle::before {
    content: "";
    position: absolute;
    inset: -10% -8%;
    border: 2.5px solid var(--gold);
    border-radius: 48% 52% 46% 54% / 58% 42% 58% 42%;
    transform: rotate(-2deg);
    opacity: 0.85;
    pointer-events: none;
  }

  /* ==================== NAV ==================== */
  nav.site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(250, 245, 236, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  /* ==================== NAV ==================== */
  nav.site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 40px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 30px;
    background: rgba(250, 245, 236, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-links-left, .nav-links-right {
    display: flex; gap: 34px; align-items: center;
  }
  .nav-links-left { justify-content: flex-end; }
  .nav-links-right { justify-content: flex-start; }
  nav.site-nav a.nav-item {
    color: var(--navy);
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: color 0.25s;
    position: relative;
    padding: 4px 0;
  }
  nav.site-nav a.nav-item::after {
    content: "";
    position: absolute;
    bottom: -3px; left: 0;
    width: 0; height: 1.5px;
    background: var(--gold);
    transition: width 0.3s;
  }
  nav.site-nav a.nav-item:hover { color: var(--gold-deep); }
  nav.site-nav a.nav-item:hover::after { width: 100%; }

  .nav-logo-center {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .nav-logo-center img, .nav-logo-center svg {
    width: 70px; height: 70px;
    object-fit: contain;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav-logo-center:hover img, .nav-logo-center:hover svg {
    transform: scale(1.06);
  }

  .nav-cta {
    background: var(--navy); color: var(--cream) !important;
    padding: 11px 22px; border-radius: 999px;
    font-size: 12px !important; font-weight: 600 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 6px 20px -6px rgba(14, 42, 75, 0.45);
    text-decoration: none;
  }
  .nav-cta:hover { background: var(--gold-deep); color: var(--cream) !important; transform: translateY(-2px); }
  .nav-cta::after { display: none !important; }

  .mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: var(--navy); }
  .nav-mobile-logo { display: none; }

  /* ==================== SHARED EYEBROW ==================== */
  .eyebrow-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .eyebrow-line { width: 44px; height: 1.5px; background: var(--gold-deep); }
  .eyebrow { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-deep); font-weight: 600; }

  /* ==================== HERO (centered editorial) ==================== */
  .hero {
    position: relative;
    padding: 140px 40px 70px;
    overflow: hidden;
    background: var(--cream);
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .hero-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.1;
    mix-blend-mode: multiply;
  }
  .hero-bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, var(--cream) 80%);
  }
  .hero-layout {
    display: grid;
    grid-template-columns: 1fr minmax(auto, 720px) 1fr;
    gap: 50px;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .hero-inner {
    text-align: center;
    position: relative;
    z-index: 3;
  }
  .hero .eyebrow-wrap {
    justify-content: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  .hero h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: clamp(2.6rem, 6.5vw, 5.8rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--navy);
    margin-bottom: 30px;
    text-transform: uppercase;
  }
  .hero h1 .line { display: block; overflow: hidden; }
  .hero h1 .line span {
    display: inline-block; opacity: 0; transform: translateY(110%);
    animation: revealUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .hero h1 .line:nth-child(1) span { animation-delay: 0.15s; }
  .hero h1 .line:nth-child(2) span { animation-delay: 0.3s; }
  .hero h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--navy);
  }

  .hero-sub {
    font-size: clamp(15px, 1.4vw, 17px);
    color: var(--ink-soft);
    max-width: 640px;
    margin: 0 auto 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
    line-height: 1.7;
  }
  .hero-cta-group {
    display: flex; gap: 16px; flex-wrap: wrap;
    align-items: center; justify-content: center;
    opacity: 0; animation: fadeUp 0.8s ease 0.85s forwards;
    margin-bottom: 50px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 17px 32px; border-radius: 999px;
    font-size: 13px; font-weight: 600; text-decoration: none;
    cursor: pointer; border: none; font-family: inherit;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-primary { background: var(--navy); color: var(--cream); box-shadow: 0 12px 28px -8px rgba(14, 42, 75, 0.4); }
  .btn-primary:hover { background: var(--gold-deep); transform: translateY(-3px); box-shadow: 0 18px 36px -10px rgba(184, 135, 38, 0.45); }
  .btn-primary .arrow { transition: transform 0.3s; }
  .btn-primary:hover .arrow { transform: translateX(5px); }
  .btn-outline {
    background: transparent; color: var(--navy);
    border: 1.5px solid var(--navy);
  }
  .btn-outline:hover { background: var(--navy); color: var(--cream); transform: translateY(-3px); }

  /* Service times row — editorial style, centered */
  .hero-service-times {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 60px;
    margin: 0 auto;
    padding: 36px 0;
    max-width: 900px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
    flex-wrap: wrap;
  }
  .hero-service-times .st-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 140px;
  }
  .hero-service-times .st-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-deep);
    font-weight: 700;
  }
  .hero-service-times .st-time {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 2.4vw, 30px);
    color: var(--navy);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  /* Hero flanking photos — collage feel */
  .hero-photo-card {
    position: relative;
    aspect-ratio: 3/4;
    width: 100%;
    max-width: 280px;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }
  .hero-photo-card.left { justify-self: end; animation-delay: 0.4s; }
  .hero-photo-card.right { justify-self: start; animation-delay: 0.6s; }
  .hero-photo-card .accent-block {
    position: absolute;
    width: 75%;
    height: 78%;
    border-radius: 6px;
    z-index: 0;
  }
  .hero-photo-card.left .accent-block {
    bottom: -14px; left: -14px;
    background: var(--gold);
    transform: rotate(-3deg);
  }
  .hero-photo-card.right .accent-block {
    top: -14px; right: -14px;
    background: var(--sky);
    transform: rotate(3deg);
  }
  .hero-photo-card .photo-frame {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background: var(--navy);
    z-index: 1;
  }
  .hero-photo-card.left .photo-frame { transform: rotate(-1.5deg); }
  .hero-photo-card.right .photo-frame { transform: rotate(1.5deg); }
  .hero-photo-card .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .hero-photo-card .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cream);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    text-align: center;
    padding: 30px;
    line-height: 1.45;
  }
  .hero-photo-card.left .photo-placeholder { background: linear-gradient(135deg, var(--navy) 0%, var(--sky) 100%); }
  .hero-photo-card.right .photo-placeholder { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%); color: var(--navy); }

  /* Retain carousel CSS for backward compat but hide */
  .hero-carousel-wrap, .hero-photos { display: none; }

  @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }

  /* ==================== MARQUEE ==================== */
  .marquee-wrap {
    overflow: hidden;
    padding: 0;
    background: var(--cream);
    position: relative;
  }
  .marquee {
    background: var(--navy);
    color: var(--cream);
    padding: 22px 0;
    overflow: hidden;
    position: relative;
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .marquee-track { display: flex; gap: 60px; animation: scroll-left 30s linear infinite; white-space: nowrap; width: max-content; }
  .marquee-item {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--cream);
    display: inline-flex;
    align-items: center;
    gap: 60px;
  }
  .marquee-item::after {
    content: "✦";
    color: var(--gold);
    font-style: normal;
  }
  @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ==================== SECTION GENERIC ==================== */
  section { position: relative; padding: 120px 40px; }
  .container { max-width: 1280px; margin: 0 auto; }
  .section-head { text-align: center; margin-bottom: 70px; }
  .section-head .eyebrow-wrap { justify-content: center; margin-bottom: 20px; }
  .section-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: clamp(2.4rem, 5vw, 4.2rem);
    color: var(--navy);
    line-height: 1.05;
    letter-spacing: -0.02em;
    max-width: 900px;
    margin: 0 auto 20px;
  }
  .section-lede {
    font-size: 18px;
    color: var(--ink-soft);
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ==================== ABOUT / WELCOME ==================== */
  .about {
    background: var(--cream-deep);
    padding: 90px 40px 120px;
    position: relative;
    overflow: hidden;
  }
  .about-grid {
    display: grid;
    grid-template-columns: 0.95fr 1.05fr;
    gap: 80px;
    align-items: center;
  }
  .about-visual {
    position: relative;
    aspect-ratio: 4/5;
  }
  .about-visual .card-main {
    position: absolute;
    top: 0; right: 0;
    width: 82%; height: 92%;
    background: var(--sky-soft);
    border-radius: 6px;
    overflow: hidden;
    transform: rotate(-2deg);
    box-shadow: var(--shadow);
  }
  .about-visual .card-main img { width: 100%; height: 100%; object-fit: cover; }
  .about-visual .card-main .card-img-placeholder {
    background: linear-gradient(135deg, var(--sky) 0%, var(--navy) 100%);
  }
  .about-visual .accent-block {
    position: absolute;
    bottom: 0; left: 0;
    width: 45%; height: 42%;
    background: var(--gold);
    border-radius: 6px;
    z-index: -1;
    transform: rotate(3deg);
  }
  .about-content .eyebrow-wrap { margin-bottom: 24px; }
  .about-content h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2.4rem, 4.5vw, 3.8rem);
    color: var(--navy);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .about-content p {
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    line-height: 1.75;
  }
  .about-content .btn { margin-top: 14px; }

  /* ==================== PULL QUOTE (BUDDY LEWIS) ==================== */
  .pullquote {
    background: var(--cream);
    padding: 140px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .pullquote-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .pullquote-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.12;
    mix-blend-mode: multiply;
  }
  .pullquote-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, var(--cream) 80%);
  }
  .pullquote-inner { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }
  .pullquote-mark {
    font-family: 'Fraunces', serif;
    font-size: 140px;
    color: var(--gold);
    line-height: 0.8;
    margin-bottom: -20px;
    opacity: 0.9;
  }
  .pullquote blockquote {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(1.7rem, 3.6vw, 2.9rem);
    color: var(--navy);
    line-height: 1.25;
    letter-spacing: -0.015em;
    margin-bottom: 40px;
  }
  .pullquote cite {
    font-style: normal;
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .pullquote cite span { color: var(--gold-deep); display: block; margin-top: 4px; font-size: 12px; letter-spacing: 0.2em; }

  /* ==================== HISTORY TIMELINE ==================== */
  .history {
    background: var(--navy);
    color: var(--cream);
    padding: 140px 40px;
    position: relative;
  }
  .history .section-title { color: var(--cream); }
  .history .eyebrow { color: var(--gold); }
  .history .eyebrow-line { background: var(--gold); }
  .history .section-lede { color: rgba(250, 245, 236, 0.75); }

  .timeline {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(232, 181, 71, 0.4);
  }
  .timeline-item {
    position: relative;
    width: 50%;
    padding: 30px 50px;
    margin-bottom: 20px;
  }
  .timeline-item:nth-child(odd) { left: 0; text-align: right; }
  .timeline-item:nth-child(even) { left: 50%; text-align: left; }
  .timeline-item::before {
    content: "";
    position: absolute;
    top: 46px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 4px solid var(--navy);
    box-shadow: 0 0 0 2px var(--gold);
    z-index: 2;
  }
  .timeline-item:nth-child(odd)::before { right: -9px; }
  .timeline-item:nth-child(even)::before { left: -9px; }
  .timeline-year {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.4rem, 4vw, 3.6rem);
    font-weight: 500;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .timeline-photo {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 4/3;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 14px 36px -14px rgba(0,0,0,0.5);
    margin-bottom: 22px;
  }
  .timeline-item:nth-child(odd) .timeline-photo { margin-left: auto; }
  .timeline-item:nth-child(even) .timeline-photo { margin-right: auto; }
  .timeline-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .timeline-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .timeline-body {
    font-size: 15px;
    color: rgba(250, 245, 236, 0.8);
    line-height: 1.7;
  }

  /* ==================== CULTURAL / DIFFERENTIATION ==================== */
  .cultural {
    background: var(--cream);
    padding: 140px 40px 80px;
  }
  .cultural-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 80px;
    align-items: center;
  }
  .cultural-content .eyebrow-wrap { margin-bottom: 24px; }
  .cultural-content h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2.2rem, 4.3vw, 3.6rem);
    color: var(--navy);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .cultural-content p {
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 22px;
    line-height: 1.75;
  }
  .cultural-visual { position: relative; aspect-ratio: 1/1.2; }
  .cultural-visual .card-main {
    position: absolute;
    top: 0; left: 0;
    width: 80%; height: 90%;
    background: var(--gold);
    border-radius: 6px;
    overflow: hidden;
    transform: rotate(3deg);
    box-shadow: var(--shadow);
  }
  .cultural-visual .card-main img { width: 100%; height: 100%; object-fit: cover; }
  .cultural-visual .card-main .card-img-placeholder {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: var(--navy);
  }
  .cultural-visual .accent-block {
    position: absolute;
    bottom: 0; right: 0;
    width: 55%; height: 45%;
    background: var(--navy);

    background: var(--navy);
    color: var(--cream);
    padding: 140px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .giving-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .giving-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.08;
    mix-blend-mode: luminosity;
  }
  .giving > .container { position: relative; z-index: 1; }
  .giving .section-title { color: var(--cream); }
  .giving .eyebrow { color: var(--gold); }
  .giving .eyebrow-line { background: var(--gold); }
  .giving-verse {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: rgba(250, 245, 236, 0.85);
    font-size: 18px;
    margin-bottom: 10px;
  }
  .giving-ref {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  .giving-ways {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1100px;
    margin: 70px auto 0;
  }
  .give-way {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232, 181, 71, 0.3);
    border-radius: 6px;
    padding: 40px 30px;
    text-align: left;
  }
  .give-way-icon {
    width: 48px;
    height: 48px;
    margin-bottom: 20px;
    color: var(--gold);
  }
  .give-way-icon svg { width: 100%; height: 100%; display: block; }
  .give-way h4 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--cream);
    margin-bottom: 14px;
  }
  .give-way p {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(250, 245, 236, 0.78);
  }

  /* ==================== VISIT / CONTACT ==================== */
  .visit {
    background: var(--cream);
    padding: 140px 40px;
    position: relative;
    overflow: hidden;
  }
  .visit-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .visit-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.1;
    mix-blend-mode: multiply;
  }
  .visit-bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, var(--cream) 85%);
  }
  .visit-grid { position: relative; z-index: 1; }
  .visit-grid {
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 70px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .visit-info .eyebrow-wrap { margin-bottom: 24px; }
  .visit-info h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2.2rem, 4.2vw, 3.4rem);
    color: var(--navy);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 30px;
  }
  .visit-detail { margin-bottom: 28px; }
  .visit-detail .label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-deep);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .visit-detail .value, .visit-detail a {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--navy);
    text-decoration: none;
    font-weight: 500;
    display: block;
    transition: color 0.25s;
  }
  .visit-detail a:hover { color: var(--gold-deep); }

  .visit-map {
    background: var(--cream-deep);
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 5/4;
    box-shadow: var(--shadow);
  }
  .visit-map iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* ==================== FORMS ==================== */
  .contact-forms {
    background: var(--cream-deep);
    padding: 140px 40px;
  }
  .cf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .cf-card {
    background: var(--ivory);
    border-radius: 6px;
    padding: 50px;
    box-shadow: var(--shadow);
  }
  .cf-card h3 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.6rem, 2.6vw, 2.2rem);
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 10px;
    line-height: 1.15;
    letter-spacing: -0.015em;
  }
  .cf-card .lede {
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 30px;
    line-height: 1.65;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy); font-weight: 600; margin-bottom: 7px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.25s, background 0.25s;
  }
  .form-group textarea { min-height: 120px; resize: vertical; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--ivory);
  }
  .cf-card .btn { width: 100%; justify-content: center; margin-top: 6px; }
  .form-note { font-size: 12px; color: var(--ink-soft); margin-top: 14px; text-align: center; font-style: italic; }
  .radio-group { display: flex; gap: 20px; margin-top: 6px; }
  .radio-group label { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; letter-spacing: 0; text-transform: none; color: var(--ink-soft); font-weight: 400; margin: 0; cursor: pointer; }
  .radio-group input[type="radio"] { width: auto; margin: 0; accent-color: var(--gold); }

  /* ==================== RESOURCES ==================== */
  .resources {
    background: var(--cream);
    padding: 100px 40px;
  }
  .res-list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 1280px;
    margin: 40px auto 0;
  }
  .res-card {
    background: var(--ivory);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--navy);
    transition: all 0.3s;
    display: block;
  }
  .res-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--shadow); }
  .res-card h5 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.25;
  }
  .res-card p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ==================== CLOSING SCRIPTURE ==================== */
  .closing {
    background: var(--cream-deep);
    padding: 120px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .closing-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .closing-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.15;
    mix-blend-mode: multiply;
  }
  .closing-bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, var(--cream-deep) 85%);
  }
  .closing > * { position: relative; z-index: 1; }
  .closing-text {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(1.8rem, 3.8vw, 3rem);
    color: var(--navy);
    line-height: 1.25;
    max-width: 900px;
    margin: 0 auto 24px;
    letter-spacing: -0.015em;
  }
  .closing-text em { color: var(--gold-deep); font-style: italic; }
  .closing-ref {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }

  /* ==================== FOOTER ==================== */
  footer {
    background: var(--navy-ink);
    color: var(--cream);
    padding: 90px 40px 30px;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 50px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .footer-brand-logo { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
  .footer-brand-logo img, .footer-brand-logo svg { width: 60px; height: 60px; object-fit: contain; }
  .footer-name { font-family: 'Fraunces', serif; font-size: 22px; color: var(--cream); font-weight: 600; line-height: 1; }
  .footer-sub { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-top: 6px; font-weight: 600; }
  .footer-brand p {
    font-size: 14px;
    color: rgba(250, 245, 236, 0.65);
    line-height: 1.7;
    max-width: 340px;
  }
  .footer-col h6 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 22px;
  }
  .footer-col a, .footer-col p {
    display: block;
    color: rgba(250, 245, 236, 0.75);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 11px;
    transition: color 0.25s;
    line-height: 1.5;
  }
  .footer-col a:hover { color: var(--gold); }
  .footer-bottom {
    margin-top: 70px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
    max-width: 1280px;
    margin-left: auto; margin-right: auto;
    font-size: 13px;
    color: rgba(250, 245, 236, 0.55);
  }
  .footer-bottom a { color: var(--gold); text-decoration: none; }
  .footer-bottom a:hover { text-decoration: underline; }

  /* ==================== REVEAL ANIM ==================== */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 0.12s; }
  .reveal.delay-2 { transition-delay: 0.24s; }
  .reveal.delay-3 { transition-delay: 0.36s; }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 1100px) {
    .leadership-grid, .ministries-cards, .conn-grid, .res-list { grid-template-columns: repeat(2, 1fr); }
    .ed-classes, .giving-ways { grid-template-columns: 1fr; }
  }
  @media (max-width: 900px) {
    /* Nav: collapse 3-col grid to hamburger + centered logo */
    nav.site-nav {
      grid-template-columns: auto 1fr auto;
      padding: 12px 20px;
      gap: 12px;
    }
    .nav-links-left, .nav-links-right {
      display: none;
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--cream); padding: 24px;
      flex-direction: column; gap: 18px;
      border-bottom: 1px solid var(--rule);
      justify-content: center !important;
    }
    .nav-links-left.open, .nav-links-right.open { display: flex; }
    .mobile-toggle { display: block; grid-column: 1; }
    .nav-logo-center { grid-column: 2; justify-self: center; }
    .nav-logo-center img, .nav-logo-center svg { width: 52px; height: 52px; }
    .nav-cta { grid-column: 3; padding: 9px 16px; font-size: 11px !important; letter-spacing: 0.08em !important; }
    /* Hide the nav-cta that lives INSIDE the right link group on mobile (use the top-level one if duplicated) */
    .nav-links-right .nav-cta { display: none; }

    section, .hero, .about, .pullquote, .history, .cultural, .mission, .verse, .pastor, .leadership, .ministries, .christian-ed, .connectional, .heritage, .events, .giving, .visit, .contact-forms, .resources, .closing { padding: 90px 22px; }

    /* Hero — stack flanking photos */
    .hero { padding: 130px 22px 60px; }
    .hero h1 { font-size: clamp(2.4rem, 11vw, 4.4rem); letter-spacing: -0.028em; }
    .hero-layout { grid-template-columns: 1fr; gap: 40px; }
    .hero-photo-card { max-width: 280px; margin: 0 auto; }
    .hero-photo-card.left { justify-self: center; }
    .hero-photo-card.right { justify-self: center; }
    .hero-inner { order: -1; }
    .hero-service-times { gap: 24px 36px; padding: 26px 0; }
    .hero-service-times .st-item { min-width: 100px; }
    .hero-service-times .st-time { font-size: 20px; }

    /* Mission cards */
    .mission-card-body { padding: 34px 26px; }

    /* Pastor 4-photo collage → stays as 2x2 but smaller */
    .pastor-visual { max-width: 420px; margin: 0 auto; }

    /* Ministry/education cards */
    .ministry-card-body { padding: 32px 26px 32px; }
    .ed-class-body { padding: 28px 22px 30px; }

    /* Leadership expanded card — stack image + body */
    .leader-card.expanded { grid-template-columns: 1fr; }
    .leader-card.expanded .leader-img { max-width: 100%; aspect-ratio: 4/3; }
    .leader-card.expanded .leader-body { padding: 32px 26px 36px; }
    .leader-card.expanded .leader-name { font-size: 22px; }

    /* Heritage stats single row on mobile */
    .heritage-stats { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .heritage-stat .big { font-size: clamp(1.4rem, 5vw, 2rem); }
    .heritage-stat .small { font-size: 9px; letter-spacing: 0.12em; }

    /* Events — stack featured event, keep past events as grid */
    .events-featured { grid-template-columns: 1fr; gap: 40px; }
    .events-featured-visual { max-width: 460px; margin: 0 auto; }
    .events-past-grid { grid-template-columns: 1fr; }

    .about-grid, .cultural-grid, .pastor-grid, .heritage-grid, .visit-grid, .cf-grid, .mission-grid { grid-template-columns: 1fr; gap: 50px; }
    .about-visual, .cultural-visual { max-width: 460px; margin: 0 auto; }

    .timeline::before { left: 20px; }
    .timeline-item { width: 100%; padding: 20px 0 20px 54px; text-align: left !important; left: 0 !important; }
    .timeline-item::before { left: 11px !important; right: auto !important; top: 30px; }
    .timeline-item:nth-child(odd) .timeline-photo,
    .timeline-item:nth-child(even) .timeline-photo { margin-left: 0; margin-right: 0; }

    .form-row { grid-template-columns: 1fr; }
    .cf-card { padding: 34px 26px; }

    .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
    .footer-brand { grid-column: 1 / -1; }
  }
  @media (max-width: 600px) {
    .leadership-grid, .ministries-cards, .conn-grid, .res-list { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr; }
    .hero-service-times { gap: 20px; }
    .mission-card-body, .cf-card { padding: 30px 24px; }
    .pullquote blockquote { font-size: clamp(1.4rem, 5vw, 1.8rem); }
    .pastor-visual { max-width: 340px; gap: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<body>

<div id="app"></div>

<!-- Default logo template (text mark) — shown when no logo uploaded -->
<template id="default-logo">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="50" cy="50" r="48" fill="#0E2A4B"/>
    <path d="M30 32 L30 68 L38 68 L38 52 L62 52 L62 68 L70 68 L70 32 L62 32 L62 46 L38 46 L38 32 Z" fill="#E8B547"/>
    <circle cx="50" cy="20" r="5" fill="#E8B547"/>
    <path d="M20 76 Q50 82 80 76" stroke="#6FA8D4" stroke-width="3" fill="none"/>
  </svg>
</template>

<script>
(async function() {
  const app = document.getElementById('app');
  let cfg;
  try {
    const res = await fetch('config.json?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to load config.json');
    cfg = await res.json();
  } catch (err) {
    app.innerHTML = '<div style="padding:80px 40px;text-align:center;font-family:system-ui;"><h1 style="color:#0E2A4B">⚠️ Configuration missing</h1><p>Could not load config.json. Please check the file exists.</p></div>';
    console.error(err);
    return;
  }

  function safe(str) {
    if (!str) return '';
    return String(str).replace(/<script/gi, '&lt;script');
  }

  // Custom SVG icons — governance + giving
  function renderIcon(name) {
    const icons = {
      dove: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 28c0-6 5-11 11-11 3 0 5 1 7 2l4-3-1 5 3 2-4 2c0 5-4 10-10 11-5 1-10-2-10-8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 28c-2 2-4 5-4 8 3-1 6-2 8-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="29" cy="19" r="1" fill="currentColor"/></svg>',
      coins: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><ellipse cx="18" cy="32" rx="10" ry="4" stroke="currentColor" stroke-width="1.8"/><path d="M8 32v-6c0-2.2 4.5-4 10-4s10 1.8 10 4v6" stroke="currentColor" stroke-width="1.8"/><ellipse cx="30" cy="20" rx="10" ry="4" stroke="currentColor" stroke-width="1.8"/><path d="M20 20v-6c0-2.2 4.5-4 10-4s10 1.8 10 4v6c0 2.2-4.5 4-10 4" stroke="currentColor" stroke-width="1.8"/></svg>',
      building: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M8 40V18l16-10 16 10v22" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M24 40V28h-6v12M30 40V28h-6" stroke="currentColor" stroke-width="1.8"/><path d="M14 22h4M14 28h4M30 22h4M30 28h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 40h40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M22 8v4h4V8" stroke="currentColor" stroke-width="1.8"/></svg>',
      hands: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M24 8v8M20 10l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 20c-2 0-4 2-4 4v6c0 4 3 8 7 10l4 2h10l4-2c4-2 7-6 7-10v-6c0-2-2-4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 22v10M34 22v10M20 20v12M28 20v12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      online: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="6" y="10" width="36" height="24" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M6 18h36" stroke="currentColor" stroke-width="1.8"/><circle cx="24" cy="26" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M17 40h14M20 34v6M28 34v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      person: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="24" cy="16" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M10 40c2-8 8-12 14-12s12 4 14 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="34" cy="28" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M30 28l2 2 4-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      envelope: '<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="6" y="12" width="36" height="24" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M6 14l18 12L42 14" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>'
    };
    return icons[name] || icons.dove;
  }

  function renderLogo(size) {
    if (cfg.brand.logo && cfg.brand.logo !== 'default' && cfg.brand.logo !== '') {
      return `<img src="${safe(cfg.brand.logo)}" alt="${safe(cfg.brand.logoAlt || 'Bethel AME Church')}" style="width:${size}px;height:${size}px;"/>`;
    }
    const tpl = document.getElementById('default-logo').innerHTML;
    return `<div style="width:${size}px;height:${size}px;" role="img" aria-label="${safe(cfg.brand.logoAlt || 'Bethel AME Church')}">${tpl}</div>`;
  }

  // Parse optional image or show placeholder gradient
  function heroCardImage() {
    if (cfg.hero.image && cfg.hero.image !== '') {
      return `<img src="${safe(cfg.hero.image)}" alt="${safe(cfg.hero.imageAlt || 'Bethel AME Church')}"/>`;
    }
    return `<div class="card-img-placeholder">The Church on the Hill<br/>Freehold, New Jersey<br/><span style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;font-style:normal;margin-top:12px;display:block;opacity:0.7;">Since 1848</span></div>`;
  }
  function imgOrPlaceholder(url, alt, placeholderText) {
    if (url && url !== '') {
      return `<img src="${safe(url)}" alt="${safe(alt)}"/>`;
    }
    return `<div class="card-img-placeholder">${safe(placeholderText)}</div>`;
  }

  // Build nav links — split around centered logo
  const allNavLinks = cfg.nav.links || [];
  const midIdx = Math.ceil(allNavLinks.length / 2);
  const navLinksLeftHTML = allNavLinks.slice(0, midIdx).map(l => `<a href="${safe(l.href)}" class="nav-item">${safe(l.label)}</a>`).join('');
  const navLinksRightHTML = allNavLinks.slice(midIdx).map(l => `<a href="${safe(l.href)}" class="nav-item">${safe(l.label)}</a>`).join('');
  // For mobile — combined list

          </div>
        </div>` : ''}
      </div>
    </section>

    <!-- ========== GIVING ========== -->
    <section id="giving" class="giving">
      ${cfg.giving.backgroundImage && cfg.giving.backgroundImage !== '' ? `<div class="giving-bg"><img src="${safe(cfg.giving.backgroundImage)}" alt="${safe(cfg.giving.backgroundImageAlt || '')}" /></div>` : ''}
      <div class="container">
        <div class="section-head reveal">
          <div class="eyebrow-wrap">
            <span class="eyebrow-line"></span>
            <span class="eyebrow">${safe(cfg.giving.eyebrow)}</span>
          </div>
          <h2 class="section-title">${safe(cfg.giving.titleLine1)} <em>${safe(cfg.giving.titleLine2)}</em></h2>
          <p class="giving-verse">"${safe(cfg.giving.verseText)}"</p>
          <p class="giving-ref">${safe(cfg.giving.verseRef)}</p>
        </div>
        <div class="giving-ways">
          ${givingHTML}
        </div>
      </div>
    </section>

    <!-- ========== VISIT ========== -->
    <section id="visit" class="visit">
      ${cfg.visit.backgroundImage && cfg.visit.backgroundImage !== '' ? `<div class="visit-bg"><img src="${safe(cfg.visit.backgroundImage)}" alt="${safe(cfg.visit.backgroundImageAlt || '')}" /></div>` : ''}
      <div class="visit-grid">
        <div class="visit-info reveal">
          <div class="eyebrow-wrap">
            <span class="eyebrow-line"></span>
            <span class="eyebrow">${safe(cfg.visit.eyebrow)}</span>
          </div>
          <h2>${safe(cfg.visit.titleLine1)} <em>${safe(cfg.visit.titleLine2)}</em></h2>
          <div class="visit-detail">
            <div class="label">Address</div>
            <span class="value">${safe(cfg.visit.address)}</span>
          </div>
          <div class="visit-detail">
            <div class="label">Sunday Worship</div>
            <span class="value">${safe(cfg.visit.sundayWorship)}</span>
          </div>
          <div class="visit-detail">
            <div class="label">Church School</div>
            <span class="value">${safe(cfg.visit.churchSchool)}</span>
          </div>
          <div class="visit-detail">
            <div class="label">Phone</div>
            <a href="tel:${safe(cfg.visit.phoneHref)}">${safe(cfg.visit.phone)}</a>
          </div>
          <div class="visit-detail">
            <div class="label">Email</div>
            <a href="mailto:${safe(cfg.visit.email)}">${safe(cfg.visit.email)}</a>
          </div>
        </div>
        <div class="visit-map reveal delay-1">
          <iframe src="${safe(cfg.visit.mapEmbed)}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Map to Bethel AME Church"></iframe>
        </div>
      </div>
    </section>

    <!-- ========== CONTACT + PRAYER FORMS ========== -->
    <section id="contact" class="contact-forms">
      <div class="cf-grid">
        <div class="cf-card reveal">
          <h3>${safe(cfg.contactForm.title)}</h3>
          <p class="lede">${safe(cfg.contactForm.lede)}</p>
          <form id="contactForm" action="${safe(contactAction)}" method="POST">
            <div class="form-row">
              <div class="form-group"><label for="cfFirst">First Name</label><input type="text" id="cfFirst" name="firstName" required></div>
              <div class="form-group"><label for="cfLast">Last Name</label><input type="text" id="cfLast" name="lastName" required></div>
            </div>
            <div class="form-group"><label for="cfEmail">Email</label><input type="email" id="cfEmail" name="email" required></div>
            <div class="form-group"><label for="cfMsg">Message</label><textarea id="cfMsg" name="message" required></textarea></div>
            <button type="submit" class="btn btn-primary">
              ${safe(cfg.contactForm.submitLabel)}
              <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
            <p class="form-note">${safe(cfg.contactForm.note)}</p>
          </form>
        </div>
        <div class="cf-card reveal delay-1">
          <h3>${safe(cfg.prayerForm.title)}</h3>
          <p class="lede">${safe(cfg.prayerForm.lede)}</p>
          <form id="prayerForm" action="${safe(prayerAction)}" method="POST">
            <div class="form-group"><label for="pfRequest">How can we pray for you?</label><textarea id="pfRequest" name="prayerRequest" required></textarea></div>
            <div class="form-group">
              <label>Would you like someone to follow up with you?</label>
              <div class="radio-group">
                <label><input type="radio" name="followUp" value="yes"> Yes</label>
                <label><input type="radio" name="followUp" value="no" checked> No</label>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label for="pfFirst">First Name (optional)</label><input type="text" id="pfFirst" name="firstName"></div>
              <div class="form-group"><label for="pfLast">Last Name (optional)</label><input type="text" id="pfLast" name="lastName"></div>
            </div>
            <div class="form-group"><label for="pfEmail">Email (optional)</label><input type="email" id="pfEmail" name="email"></div>
            <div class="form-group"><label for="pfPhone">Phone (optional)</label><input type="tel" id="pfPhone" name="phone"></div>
            <button type="submit" class="btn btn-primary">
              ${safe(cfg.prayerForm.submitLabel)}
              <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
            <p class="form-note">${safe(cfg.prayerForm.note)}</p>
          </form>
        </div>
      </div>
    </section>

    <!-- ========== RESOURCES ========== -->
    <section class="resources">
      <div class="container">
        <div class="section-head reveal">
          <div class="eyebrow-wrap">
            <span class="eyebrow-line"></span>
            <span class="eyebrow">${safe(cfg.resources.eyebrow)}</span>
          </div>
          <h2 class="section-title" style="font-size:clamp(1.8rem,3.4vw,2.6rem);">${safe(cfg.resources.titleLine1)} <em>${safe(cfg.resources.titleLine2)}</em></h2>
          <p class="section-lede">${safe(cfg.resources.lede)}</p>
        </div>
        <div class="res-list">${resourcesHTML}</div>
      </div>
    </section>

    <!-- ========== CLOSING SCRIPTURE ========== -->
    <section class="closing">
      ${cfg.closing.backgroundImage && cfg.closing.backgroundImage !== '' ? `<div class="closing-bg"><img src="${safe(cfg.closing.backgroundImage)}" alt="${safe(cfg.closing.backgroundImageAlt || '')}" /></div>` : ''}
      <p class="closing-text">"${safe(cfg.closing.text)}"</p>
      <p class="closing-ref">${safe(cfg.closing.reference)}</p>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer>
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-brand-logo">
            ${renderLogo(60)}
            <div style="line-height:1;">
              <div class="footer-name">${safe(cfg.brand.name)}</div>
              <div class="footer-sub">${safe(cfg.brand.tagline)}</div>
            </div>
          </div>
          <p>${safe(cfg.brand.footerTagline)}</p>
        </div>
        <div class="footer-col">
          <h6>Explore</h6>
          ${cfg.footer.exploreLinks.map(l => `<a href="${safe(l.href)}">${safe(l.label)}</a>`).join('')}
        </div>
        <div class="footer-col">
          <h6>Connect</h6>
          ${cfg.footer.connectLinks.map(l => `<a href="${safe(l.href)}" ${l.href.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>${safe(l.label)}</a>`).join('')}
        </div>
        <div class="footer-col">
          <h6>Visit</h6>
          <p>${safe(cfg.footer.visitAddress)}</p>
          <p>${safe(cfg.footer.visitCityState)}</p>
          <a href="tel:${safe(cfg.footer.visitPhoneHref)}">${safe(cfg.footer.visitPhone)}</a>
          <a href="mailto:${safe(cfg.footer.visitEmail)}">${safe(cfg.footer.visitEmail)}</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span>© <span id="year"></span> ${safe(cfg.footer.copyright)}</span>
        <span>Designed with care by <a href="${safe(cfg.footer.designerCredit.href)}" target="_blank" rel="noopener">${safe(cfg.footer.designerCredit.label)}</a></span>
      </div>
    </footer>
  `;

  document.getElementById('year').textContent = new Date().getFullYear();

  // Mobile nav toggle — opens both left + right link groups
  const toggle = document.getElementById('mobileToggle');
  const linksLeft = document.getElementById('navLinksLeft');
  const linksRight = document.getElementById('navLinksRight');
  if (toggle) {
    toggle.addEventListener('click', () => {
      if (linksLeft) linksLeft.classList.toggle('open');
      if (linksRight) linksRight.classList.toggle('open');
    });
    [linksLeft, linksRight].forEach(group => {
      if (!group) return;
      group.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        if (linksLeft) linksLeft.classList.remove('open');
        if (linksRight) linksRight.classList.remove('open');
      }));
    });
  }

  // Reveal on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Form handling
  function handleForm(formId, action) {
    const form = document.getElementById(formId);
    if (!form) return;
    form.addEventListener('submit', async function(e) {
      const btn = form.querySelector('button');
      const orig = btn.innerHTML;

      if (provider === 'demo' || !action) {
        e.preventDefault();
        btn.innerHTML = 'Sending...';
        btn.disabled = true;
        setTimeout(() => {
          btn.innerHTML = '✦ Message received (demo mode)';
          setTimeout(() => {
            btn.innerHTML = orig;
            btn.disabled = false;
            form.reset();
          }, 3500);
        }, 800);
        return;
      }

      if (provider === 'formspree') {
        e.preventDefault();
        if (!action || action.includes('YOUR_FORM_ID')) {
          btn.innerHTML = '⚠️ Form not configured';
          setTimeout(() => { btn.innerHTML = orig; }, 4000);
          return;
        }
        btn.innerHTML = 'Sending...';
        btn.disabled = true;
        try {
          const data = new FormData(form);
          const res = await fetch(action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
          if (res.ok) {
            btn.innerHTML = '✦ Thank you — we\'ll be in touch';
            form.reset();
          } else {
            btn.innerHTML = '⚠️ Something went wrong';
          }
        } catch (err) {
          btn.innerHTML = '⚠️ Network error';
        }
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.disabled = false;
        }, 5000);
      }
    });
  }
  handleForm('contactForm', contactAction);
  handleForm('prayerForm', prayerAction);

  // ==================== PASTOR CAROUSEL ====================
  (function initPastorCarousel() {
    const track = document.getElementById('pastorCarouselTrack');
    const dots = document.querySelectorAll('.pastor-carousel-dot');
    const prev = document.getElementById('pastorPrev');
    const next = document.getElementById('pastorNext');
    const carousel = document.getElementById('pastorCarousel');
    if (!track || dots.length <= 1) return;

    let current = 0;
    const total = dots.length;
    let autoTimer = null;

    function goTo(idx) {
      current = (idx + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }
    function startAuto() {
      stopAuto();
      autoTimer = setInterval(() => goTo(current + 1), 6000);
    }
    function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

    if (prev) prev.addEventListener('click', () => { goTo(current - 1); startAuto(); });
    if (next) next.addEventListener('click', () => { goTo(current + 1); startAuto(); });
    dots.forEach(d => d.addEventListener('click', () => {
      goTo(parseInt(d.dataset.idx, 10));
      startAuto();
    }));

    if (carousel) {
      carousel.addEventListener('mouseenter', stopAuto);
      carousel.addEventListener('mouseleave', startAuto);
    }

    let touchStartX = 0;
    if (carousel) {
      carousel.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        stopAuto();
      }, { passive: true });
      carousel.addEventListener('touchend', (e) => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
        startAuto();
      }, { passive: true });
    }

    startAuto();
  })();

  // ==================== LEADERSHIP EXPAND/COLLAPSE ====================
  document.querySelectorAll('.leader-expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.leader-card');
      const expanded = card.classList.toggle('expanded');
      btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      btn.querySelector('.expand-text').textContent = expanded ? 'Close bio' : 'Read full bio';
    });
  });
})();
</script>

<!-- Redirect to /admin after Netlify Identity signup invite is accepted -->
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

</body>
